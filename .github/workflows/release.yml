name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Resolve version
        id: version
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $parsedVersion = $null
          if (-not [System.Version]::TryParse($version, [ref]$parsedVersion)) {
            throw "Version '$version' is not a valid System.Version value. Use a tag like v1.5.2.2."
          }

          Write-Host "Resolved version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Update version in JSON files
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          # We are in detached HEAD (tag checkout), switch to the repository default branch.
          $branch = "${{ github.event.repository.default_branch }}"
          if (-not $branch) {
            $branch = "master"
          }
          Write-Host "Switching to branch: $branch"
          git checkout $branch
          git pull --ff-only origin $branch

          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Updating JSON files to version $version"

          # Update pluginmaster.json (array of plugin entries)
          $pm = Get-Content -Raw "pluginmaster.json" | ConvertFrom-Json
          $pm[0].AssemblyVersion = $version
          $pm[0].TestingAssemblyVersion = $version
          $pm | ConvertTo-Json -Depth 10 -AsArray | Set-Content "pluginmaster.json"
          Write-Host "Updated pluginmaster.json"

          # Update PocketStation.json (single plugin manifest)
          $ps = Get-Content -Raw "PocketStation.json" | ConvertFrom-Json
          $ps.AssemblyVersion = $version
          $ps | ConvertTo-Json -Depth 10 | Set-Content "PocketStation.json"
          Write-Host "Updated PocketStation.json"

          # Commit and push the version bump
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json PocketStation.json
          $stagedChanges = git diff --cached --name-only
          if (-not $stagedChanges) {
            Write-Host "Version files already match $version; nothing to commit."
          } else {
            git commit -m "Bump version to $version [skip ci]"
            git push origin "HEAD:$branch"
          }

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Plugin
        run: |
          $version = "${{ steps.version.outputs.version }}"
          dotnet build PocketStation.csproj --configuration Release `
            /p:Version="$version" `
            /p:AssemblyVersion="$version" `
            /p:FileVersion="$version" `
            /p:InformationalVersion="$version"

      - name: Verify plugin assembly version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $assemblyPath = "bin\Release\PocketStation.dll"
          if (-not (Test-Path $assemblyPath)) {
            throw "Plugin assembly not found: $assemblyPath"
          }

          $actualVersion = [System.Reflection.AssemblyName]::GetAssemblyName($assemblyPath).Version.ToString()
          Write-Host "PocketStation.dll assembly version: $actualVersion"
          if ($actualVersion -ne $version) {
            throw "Plugin assembly version '$actualVersion' does not match release version '$version'."
          }

      - name: Package Plugin
        run: |
          Compress-Archive -Path "bin\Release\*" -DestinationPath "latest.zip" -Force
          if (-not (Test-Path "latest.zip")) { throw "latest.zip was not created!" }
          Write-Host "latest.zip created: $(Get-Item latest.zip | Select-Object Length)"

      - name: Generate pocketstation-entry.json (release artifact)
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
          $downloadUrl = "$repoUrl/releases/latest/download/latest.zip"

          $entry = @{
            Author                 = "Wotou"
            Name                   = "Pocket Station"
            Punchline              = "把手机变成 FFXIV 自动化的控制终端。"
            Description            = "Pocket Station 是一个在 FFXIV 中运行的 Web 服务器，让你可以通过同一网络下的手机、平板或笔记本电脑连接。实时监控游戏聊天并支持自定义过滤器，实时串流游戏画面到移动设备，以及远程执行游戏指令。使用 Tailscale 或路由器端口转发，也可在外网安全访问。"
            InternalName           = "PocketStation"
            AssemblyVersion        = $version
            TestingAssemblyVersion = $version
            ApplicableVersion      = "any"
            Tags                   = @("chat", "lan", "mobile", "monitor", "screenshot", "live-stream", "remote-control", "second-screen", "web-console")
            DalamudApiLevel        = 12
            IconUrl                = "https://raw.githubusercontent.com/kanyeishere/PocketStationTC/master/icon.png"
            RepoUrl                = $repoUrl
            DownloadLinkInstall    = $downloadUrl
            DownloadLinkTesting    = $downloadUrl
            DownloadLinkUpdate     = $downloadUrl
          }

          @($entry) | ConvertTo-Json -Depth 10 -AsArray | Set-Content "pocketstation-entry.json"
          Write-Host "=== pocketstation-entry.json ==="
          Get-Content "pocketstation-entry.json"

          if (-not (Test-Path "pocketstation-entry.json")) { throw "pocketstation-entry.json was not created!" }

      - name: Create Release & Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $existing = gh release view "$tag" --json id 2>$null
          if ($existing) {
            Write-Host "Release $tag already exists, uploading additional assets..."
          } else {
            Write-Host "Creating new release $tag..."
            gh release create "$tag" `
              --title "$tag" `
              --generate-notes `
              --latest
          }

          Write-Host "Uploading latest.zip..."
          gh release upload "$tag" "latest.zip" --clobber

          Write-Host "Uploading pocketstation-entry.json..."
          gh release upload "$tag" "pocketstation-entry.json" --clobber

          Write-Host "All assets uploaded successfully."

      - name: Aggregate manifest (merge with PocketRecorder)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "=== Running manifest aggregation ==="
          & ".github/scripts/aggregate-manifest.ps1" `
            -PocketStationRepo "${{ github.repository }}" `
            -PocketRecorderRepo "kanyeishere/PocketRecorderTC" `
            -GithubToken "${{ github.token }}"

          Write-Host "Uploading aggregated pluginmaster.json..."
          $tag = "${{ steps.version.outputs.tag }}"
          gh release upload "$tag" "pluginmaster.json" --clobber
          Write-Host "pluginmaster.json uploaded successfully."
