name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    env:
      DALAMUD_HOME: ${{ github.workspace }}\lib

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Resolve version
        id: version
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $parsedVersion = $null
          if (-not [System.Version]::TryParse($version, [ref]$parsedVersion)) {
            throw "Version '$version' is not a valid System.Version value. Use a tag like v1.5.2.2."
          }

          Write-Host "Resolved version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Update version in JSON files
        run: |
          # We are in detached HEAD (tag checkout), switch to the default branch
          $branch = git symbolic-ref refs/remotes/origin/HEAD 2>$null
          if (-not $branch) {
            $branch = git branch -r | Where-Object {$_ -notmatch 'origin/HEAD|->'} | Select-Object -First 1
          }
          $branch = ($branch -replace '^refs/remotes/origin/', '' -replace '^origin/', '').Trim()
          Write-Host "Switching to branch: $branch"
          git checkout $branch
          git pull origin $branch

          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Updating JSON files to version $version"

          # Update pluginmaster.json (array of plugin entries)
          $pm = Get-Content -Raw "pluginmaster.json" | ConvertFrom-Json
          $pm[0].AssemblyVersion = $version
          $pm[0].TestingAssemblyVersion = $version
          $pm | ConvertTo-Json -Depth 10 | Set-Content "pluginmaster.json"
          Write-Host "Updated pluginmaster.json"

          # Update PocketStation.json (single plugin manifest)
          $ps = Get-Content -Raw "PocketStation.json" | ConvertFrom-Json
          $ps.AssemblyVersion = $version
          $ps | ConvertTo-Json -Depth 10 | Set-Content "PocketStation.json"
          Write-Host "Updated PocketStation.json"

          # Commit and push the version bump
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json PocketStation.json
          git commit -m "Bump version to $version [skip ci]"
          git push origin $branch

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Plugin
        run: dotnet build --configuration Release /p:DalamudDevPath="${{ github.workspace }}\lib"

      - name: Package Plugin
        run: |
          Compress-Archive -Path "bin\Release\*" -DestinationPath "latest.zip" -Force
          if (-not (Test-Path "latest.zip")) { throw "latest.zip was not created!" }
          Write-Host "latest.zip created: $(Get-Item latest.zip | Select-Object Length)"

      - name: Generate pluginmaster.json (release artifact)
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
          $downloadUrl = "$repoUrl/releases/latest/download/latest.zip"

          $entry = @{
            Author                 = "Wotou"
            Name                   = "Pocket Station"
            Punchline              = "Turn your phone into a second screen for FFXIV — chat, player state, screenshots, live streaming & remote commands over LAN."
            Description            = "Pocket Station runs a local web server inside FFXIV, letting you connect from any phone, tablet, or laptop on the same network. Monitor real-time game chat with custom filters, view player / party / target state (HP, MP, buffs, zone, currencies), capture screenshots or stream your game screen live to your mobile device, and execute whitelisted in-game commands remotely. Also integrates with DailyRoutines to toggle automation modules. Use Tailscale or router port forwarding to access it securely from outside your home network."
            InternalName           = "PocketStation"
            AssemblyVersion        = $version
            TestingAssemblyVersion = $version
            ApplicableVersion      = "any"
            Tags                   = @("chat", "lan", "mobile", "monitor", "screenshot", "live-stream", "remote-control", "second-screen", "web-console")
            DalamudApiLevel        = 15
            RepoUrl                = $repoUrl
            DownloadLinkInstall    = $downloadUrl
            DownloadLinkTesting    = $downloadUrl
            DownloadLinkUpdate     = $downloadUrl
          }

          @($entry) | ConvertTo-Json -Depth 10 | Set-Content "pluginmaster.json"
          Write-Host "=== pluginmaster.json ==="
          Get-Content "pluginmaster.json"

          if (-not (Test-Path "pluginmaster.json")) { throw "pluginmaster.json was not created!" }

      - name: Create Release & Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $existing = gh release view "$tag" --json id 2>$null
          if ($existing) {
            Write-Host "Release $tag already exists, uploading additional assets..."
          } else {
            Write-Host "Creating new release $tag..."
            gh release create "$tag" `
              --title "$tag" `
              --generate-notes `
              --latest
          }

          Write-Host "Uploading latest.zip..."
          gh release upload "$tag" "latest.zip" --clobber

          Write-Host "Uploading pluginmaster.json..."
          gh release upload "$tag" "pluginmaster.json" --clobber

          Write-Host "All assets uploaded successfully."
