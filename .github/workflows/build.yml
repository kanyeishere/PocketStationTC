name: PR Build Check

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Plugin
        run: dotnet build PocketStation.csproj --configuration Release

      - name: Store Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Plugin-PocketStation
          path: bin\Release\*
          retention-days: 1
